<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mio AI – Outcomes Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f6f8;color:#0d1b2a;display:flex;min-height:100vh}

/* ─── Sidebar ─── */
.sidebar{
  width:60px;background:#1a1d2e;display:flex;flex-direction:column;
  align-items:center;padding:18px 0;gap:6px;position:fixed;top:0;left:0;bottom:0;z-index:200;
}
.sb-logo{width:34px;height:34px;background:#6d28d9;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900;margin-bottom:18px}
.sb-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#6b7a99;cursor:pointer;transition:all .15s;font-size:16px}
.sb-icon:hover{background:#ffffff12;color:#fff}
.sb-icon.active{background:#6d28d914;color:#5b21b6}
.sb-spacer{flex:1}

/* ─── Main wrapper ─── */
.main{margin-left:60px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ─── Top bar ─── */
.topbar{
  background:#fff;border-bottom:1px solid #e5e7eb;padding:0 28px;
  height:56px;display:flex;align-items:center;gap:0;
  position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.tb-brand{display:flex;align-items:baseline;gap:5px;margin-right:28px}
.tb-mio{font-size:18px;font-weight:800;color:#6d28d9;letter-spacing:-.3px}
.tb-beta{font-size:9px;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:4px;padding:1px 5px;margin-left:3px;vertical-align:super;line-height:1;letter-spacing:.3px;text-transform:uppercase}
.tb-insights{font-size:16px;font-weight:700;color:#0d1b2a;margin-left:4px}
.tb-tabs{display:flex;align-items:stretch;height:56px;gap:0}
.tb-tab{padding:0 20px;border:none;background:transparent;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;position:relative;font-family:inherit;transition:color .15s}
.tb-tab:hover{color:#0d1b2a}
.tb-tab.active{color:#6d28d9;font-weight:600}
.tb-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:#6d28d9;border-radius:2px 2px 0 0}

/* ─── Topbar inline filters ─── */
.tb-filters{margin-left:auto;display:flex;align-items:center;gap:12px}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-lbl{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.filter-select-wrap{position:relative;display:flex;align-items:center}
.filter-select-wrap::after{content:'▾';position:absolute;right:10px;font-size:10px;color:#6b7280;pointer-events:none}
.filter-sel{appearance:none;-webkit-appearance:none;padding:6px 30px 6px 11px;border:1px solid #e5e7eb;border-radius:7px;background:#fff;font-size:12px;font-weight:500;color:#0d1b2a;font-family:inherit;cursor:pointer;outline:none;transition:border-color .15s;min-width:160px}
.hm-sel{min-width:140px;font-size:11px;padding:5px 26px 5px 9px}
.filter-sel:hover{border-color:#a5b4fc}
.filter-sel:focus{border-color:#6d28d9;box-shadow:0 0 0 2px #ede9fe}
.filter-divider{width:1px;height:24px;background:#e5e7eb;margin:0 4px}
.custom-range{display:flex;align-items:center;gap:6px}
.date-input{padding:5px 9px;border:1px solid #e5e7eb;border-radius:7px;font-size:12px;font-family:inherit;color:#0d1b2a;outline:none;cursor:pointer;background:#fff;transition:border-color .15s}
.date-input:focus{border-color:#6d28d9;box-shadow:0 0 0 2px #ede9fe}
.date-sep{font-size:12px;color:#9ca3af;font-weight:500}
.apply-btn{padding:5px 14px;border-radius:7px;border:none;background:#6d28d9;color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.apply-btn:hover{background:#5b21b6}

/* ─── Content ─── */
.content{padding:24px 28px;flex:1}

/* ─── Agent pills (hidden — replaced by filter bar dropdown) ─── */
.agent-bar{display:none}

/* ─── Config note ─── */
.config-note{display:flex;align-items:center;gap:8px;background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:9px 14px;font-size:12px;color:#92400e;margin-bottom:18px}
.hidden{display:none!important}

/* ─── KPI Row ─── */
.kpi-row{display:grid;gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:14px;padding:20px 22px 18px;border:1px solid #eaecf0;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.kpi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.kpi-metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;margin-bottom:5px}
.kpi-value{font-size:24px;font-weight:800;color:#111827;line-height:1;letter-spacing:-.5px;margin-bottom:4px}
.kpi-sub{font-size:12px;color:#6b7280;font-weight:400;margin-bottom:10px}
.kpi-delta-row{margin-top:2px}
.kpi-delta-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.kpi-delta-tag.up{background:#d1fae5;color:#065f46}
.kpi-delta-tag.dn{background:#fee2e2;color:#991b1b}

/* ─── Section label ─── */
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#5b21b6;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-lbl::after{content:'';flex:1;height:1px;background:#ddd6fe}

/* ─── Grid helpers ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.grid-3c{display:grid;grid-template-columns:1fr 1fr 1.8fr;gap:16px;margin-bottom:22px}

/* ─── Generic card ─── */
.card{background:#fff;border-radius:10px;padding:22px;border:1px solid #eaecf0;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card-title{font-size:14px;font-weight:700;color:#0d1b2a;margin-bottom:3px}
.card-sub{font-size:11px;color:#9ca3af;margin-bottom:16px}
.flex-between{display:flex;justify-content:space-between;align-items:flex-start}
.chip{background:#f3f4f6;color:#4b5563;font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;border:1px solid #e5e7eb}

/* ─── Agent success table ─── */
.sc-table{width:100%;border-collapse:collapse}
.sc-table thead tr{background:#ffffff;border-bottom:2px solid #eaecf0}
.sc-table thead th{padding:11px 20px;font-size:11px;font-weight:600;color:#9ca3af;text-align:left;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.sc-table thead th:not(:first-child){text-align:right}
.sc-table thead th:nth-child(2){text-align:left}
.sc-table th:first-child,.sc-table td:first-child{width:22%}
.sc-table th:nth-child(2),.sc-table td:nth-child(2){width:14%;white-space:nowrap}
.sc-table th:nth-child(3),.sc-table td:nth-child(3){width:16%;text-align:center!important}
.sc-table th:nth-child(4),.sc-table td:nth-child(4){width:14%}
.sc-table th:nth-child(5),.sc-table td:nth-child(5){width:18%}
.sc-table th:nth-child(6),.sc-table td:nth-child(6){width:16%}
.sc-table tbody tr{border-bottom:1px solid #f3f4f6;transition:background .1s}
.sc-table tbody tr:last-child{border-bottom:none}
.sc-table tbody tr:hover{background:#faf9ff}
.sc-table tbody td{padding:14px 20px;font-size:13px;color:#0d1b2a;vertical-align:middle}
.sc-table tbody td:not(:first-child){text-align:right;font-weight:600}
.sc-agent-badge{display:inline-flex;align-items:center;gap:7px}
.sc-agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sc-agent-name{font-size:13px;font-weight:600;color:#0d1b2a}
.sc-agent-type{font-size:11px;color:#9ca3af;font-weight:400}
.sc-num{font-size:14px;font-weight:700;color:#111827}
.sc-pct-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.sc-pct-blue{background:#dbeafe;color:#1e40af}

/* ─── Donut ─── */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-canvas-wrap{position:relative;width:145px;height:145px;flex-shrink:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-center-val{font-size:18px;font-weight:800;color:#0d1b2a}
.donut-center-lbl{font-size:10px;color:#9ca3af;font-weight:500}
.legend-list{flex:1;display:flex;flex-direction:column;gap:7px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;color:#4b5563;font-weight:500}
.legend-count{font-weight:700;color:#0d1b2a;width:34px;text-align:right}
.legend-pct{color:#9ca3af;width:30px;text-align:right}

/* ─── Sentiment ─── */
.sentiment-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sent-emoji{font-size:14px;width:20px}
.sent-lbl{font-size:12px;font-weight:500;width:68px;color:#4b5563}
.sent-bar-bg{flex:1;height:5px;border-radius:3px;background:#f3f4f6;overflow:hidden}
.sent-bar-fill{height:100%;border-radius:3px}
.sent-count{font-size:12px;font-weight:600;width:30px;text-align:right;color:#0d1b2a}
.sent-pct{font-size:11px;color:#9ca3af;width:28px;text-align:right}
.sat-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f3f4f6;margin-top:10px;padding-top:11px;font-size:12px;color:#6b7280}
.sat-val{font-size:20px;font-weight:800;color:#0d1b2a}

/* ─── Top agents ─── */
.ta-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f9fafb}
.ta-row:last-child{border-bottom:none}
.ta-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.ta-name{font-size:12px;font-weight:600;color:#0d1b2a}
.ta-type{font-size:10px;color:#9ca3af}
.ta-prog{flex:1;max-width:100px;display:flex;align-items:center;height:4px}
.ta-prog-fill{height:4px;border-radius:2px 0 0 2px;flex-shrink:0}
.ta-prog-dash{flex:1;border-bottom:2px dashed #e5e7eb;height:0}
.ta-pct{font-size:12px;font-weight:700;width:32px;text-align:right}
.avg-row{display:flex;justify-content:space-between;align-items:center;background:#f9fafb;border-radius:8px;padding:9px 12px;margin-top:10px;font-size:12px;color:#6b7280;font-weight:500;border:1px solid #e5e7eb}
.avg-val{font-size:18px;font-weight:800;color:#0d1b2a}

/* ─── Call Intelligence ─── */
.intel-head{display:flex;gap:0;padding:0 0 8px 150px;border-bottom:1px solid #e5e7eb;margin-bottom:2px}
.intel-col-head{flex:1;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af}
.intel-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f9fafb}
.intel-row:last-child{border-bottom:none}
.intel-av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.intel-info{width:108px;flex-shrink:0}
.intel-name{font-size:12px;font-weight:600;color:#0d1b2a}
.intel-type{font-size:10px;color:#9ca3af}
.intel-stats{flex:1;display:flex}
.intel-stat{flex:1;text-align:center}
.intel-val{font-size:13px;font-weight:700}
.intel-lbl{font-size:9px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}

/* ─── Heatmap ─── */
.hm-tabs{display:flex;gap:5px;flex-wrap:wrap}
.hm-tab{padding:4px 11px;border-radius:6px;border:1px solid #e5e7eb;background:#fff;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .15s}
.hm-tab:hover{border-color:#c0c8e0}
.hm-tab.hm-active{color:#fff;border-color:transparent}
.heatmap-grid{overflow-x:auto;margin-top:10px}
.heatmap-table{border-collapse:separate;border-spacing:3px;width:100%}
.heatmap-table th{font-size:10px;font-weight:600;color:#9ca3af;padding:0 2px 5px;text-align:center}
.heatmap-table td{height:25px;border-radius:5px;cursor:pointer;transition:transform .12s;position:relative}
.heatmap-table td:hover{transform:scale(1.1);z-index:2}
.heatmap-table .row-label{font-size:10px;color:#9ca3af;font-weight:500;text-align:right;padding-right:6px;white-space:nowrap;background:transparent;width:40px}
.hm-legend{display:flex;align-items:center;gap:5px;margin-top:9px;justify-content:center}
.hm-legend-lbl{font-size:10px;color:#9ca3af;font-weight:500}
.hm-legend-step{width:14px;height:9px;border-radius:2px}
/* ─── Heatmap Insights ─── */
.hm-insights{display:flex;flex-direction:column;gap:8px}
.hm-insight-row{display:flex;align-items:flex-start;gap:10px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:10px;padding:9px 12px}
.hm-insight-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;background:#fff}
.hm-insight-text{font-size:12px;color:#374151;line-height:1.5}
.hm-insight-text strong{color:#111827;font-weight:600}

/* ─── Chart ─── */
.chart-wrap{position:relative;width:100%}

@media(max-width:900px){.grid-2,.grid-3c{grid-template-columns:1fr}}

/* ─── Mobile responsive ─── */
@media(max-width:768px){
  body{overflow-x:hidden}
  .sidebar{display:none}
  .main{margin-left:0;max-width:100vw;overflow-x:hidden}

  /* Topbar: brand row + filters row stacked */
  .topbar{flex-wrap:wrap;height:auto;padding:10px 14px 0;gap:0}
  .tb-brand{margin-right:auto}
  .tb-tabs{
    order:3;width:calc(100% + 28px);margin:6px -14px 0;
    height:38px;border-top:1px solid #f3f4f6;
    padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    display:flex;align-items:stretch;flex-shrink:0
  }
  .tb-tab{padding:0 14px;font-size:12px;white-space:nowrap}

  /* Filters: full width row, stack two selects side by side */
  .tb-filters{
    order:2;margin-left:0;width:100%;
    flex-wrap:nowrap;gap:8px;padding:6px 0 8px
  }
  .filter-group{flex:1;min-width:0;gap:0}
  .filter-lbl{display:none}
  .filter-select-wrap{width:100%}
  .filter-sel{width:100%;min-width:0;font-size:12px;padding:6px 26px 6px 9px}
  .filter-divider{display:none}
  .custom-range{flex-wrap:wrap;gap:4px}
  .date-input{flex:1;min-width:100px}

  /* Content */
  .content{padding:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr)!important;gap:10px}
  .kpi-card{padding:14px 12px 12px}
  .kpi-value{font-size:20px}
  .kpi-sub{font-size:11px}
  .kpi-metric-label{font-size:9px}

  /* Stack all two-col grids */
  .grid-2,.grid-3c{grid-template-columns:1fr!important;gap:12px}

  /* Heatmap scroll */
  .heatmap-grid{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .heatmap-table{min-width:310px}
  .heatmap-table th,.heatmap-table .row-label{font-size:9px}

  /* Heatmap + Insights: stack vertically on mobile */
  .hm-layout{grid-template-columns:1fr!important;gap:20px}
  .hm-layout>div:last-child{border-left:none!important;padding-left:0!important;border-top:1px solid #f3f4f6;padding-top:16px}
  .hm-insights{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hm-insight-row{padding:10px 12px}
  .hm-insight-text{font-size:12px}

  .card{padding:14px}
  .card-title{font-size:13px}
  .section-lbl{font-size:10px}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:repeat(2,1fr)!important}
  .tb-tabs{display:none}
  .topbar{padding:10px 12px 0}
  .sc-card{overflow:visible!important}
}

/* ─── Heatmap custom tooltip ─── */
#hmTooltip{
  position:fixed;pointer-events:none;z-index:9999;
  background:#1a1d2e;color:#fff;border-radius:8px;
  padding:8px 12px;font-size:12px;font-family:'Inter',sans-serif;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  opacity:0;transition:opacity .1s;white-space:nowrap;
}
#hmTooltip .hmt-day{font-weight:700;font-size:13px;margin-bottom:2px}
#hmTooltip .hmt-val{font-size:12px;color:#c4b5fd}
#hmTooltip .hmt-val.blue{color:#93c5fd}

/* ─── KPI Tooltip ─── */
.kpi-tooltip-wrap{display:inline-flex;align-items:center;gap:6px;width:100%}
.kpi-info-icon{
  width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:help;flex-shrink:0;position:relative;
  transition:all .2s;
  color:#9ca3af;
}
.kpi-info-icon:hover{color:#6b7280}
.kpi-tooltip{
  position:fixed;
  background:#1a1d2e;color:#fff;border-radius:8px;
  padding:10px 14px;font-size:11px;line-height:1.5;
  white-space:normal;z-index:1000;
  opacity:0;visibility:hidden;transition:all .2s;
  pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);
  max-width:220px;
}
.kpi-tooltip::after{
  content:'';position:absolute;bottom:100%;left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;border-bottom-color:#1a1d2e;
}
.kpi-info-icon:hover .kpi-tooltip{
  opacity:1;visibility:visible;
}
</style>
</head>
<body>

<div id="hmTooltip"><div class="hmt-day"></div><div class="hmt-val"></div></div>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo">M</div>
  <div class="sb-icon active">⊞</div>
  <div class="sb-icon">↗</div>
  <div class="sb-icon">⊕</div>
  <div class="sb-icon">↺</div>
  <div class="sb-spacer"></div>
  <div class="sb-icon">👤</div>
  <div class="sb-icon">?</div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="tb-brand">
      <span class="tb-mio">Mio AI</span><sup class="tb-beta">Beta</sup>
      <span class="tb-insights">Insights</span>
    </div>
    <nav class="tb-tabs">
      <button class="tb-tab" onclick="switchTab(this)">AI Guide</button>
      <button class="tb-tab active" onclick="switchTab(this)">AI Voice</button>
    </nav>
    <div class="tb-filters">
      <div class="filter-group">
        <span class="filter-lbl">Agent</span>
        <div class="filter-select-wrap">
          <select class="filter-sel" id="agentFilter" onchange="filterAgent(this.value)">
            <option value="all">All Agents</option>
            <option value="lq">Lead Qualification Agent</option>
            <option value="lr">Lead Reactivation Agent</option>
          </select>
        </div>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group">
        <span class="filter-lbl">Date Range</span>
        <div class="filter-select-wrap">
          <select class="filter-sel" id="dateFilter" onchange="handleDateFilter(this.value)">
            <option value="1d">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d" selected>Last 30 Days</option>
            <option value="90d">Last 90 Days</option>
            <option value="month">This Month</option>
            <option value="custom">Custom Range…</option>
          </select>
        </div>
        <div class="custom-range hidden" id="customRange">
          <span class="date-sep">From</span>
          <input type="date" class="date-input" id="dateFrom"/>
          <span class="date-sep">To</span>
          <input type="date" class="date-input" id="dateTo"/>
          <button class="apply-btn" onclick="applyCustomRange()">Apply</button>
        </div>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content">

    <!-- Agent pills -->
    <div class="agent-bar">
      <span class="bar-lbl">View:</span>

  activeDayCount={

function applyCustomRange(){

}
function _populateHmSelect(selId, agents, activeId){
  const sel=document.getElementById(selId);

// Average heatmap data across all provided agents
function _avgHeatmapData(mode, agents){
  const rows=13, cols=7;
  return Array.from({length:rows},(_,r)=>
    Array.from({length:cols},(_,c)=>
      Math.round(agents.reduce((s,a)=>s+HEATMAP[a.id][mode][r][c],0)/agents.length)
    )
  );
}
function _renderHmGrid(mode, agentId, agents){
  const isAll=agentId==='all';
  const a=isAll?agents[0]:AGENTS[agentId];
  const data=isAll?_avgHeatmapData(mode,agents):HEATMAP[agentId][mode];
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hours=['9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM','7 PM','8 PM','9 PM'];
  const tableId=mode==='outcome'?'hmTableOutcome':'hmTableConn';
  const legendId=mode==='outcome'?'hmLegendOutcome':'hmLegendConn';
  // Outcome: purple opacity ramp; Connection: near-white → deep navy with power curve for contrast
  const cfn=mode==='outcome'
    ? v=>`rgba(${hexToRgb(a.color)},${0.06+(v/100)*0.92})`
    : v=>{
        const t=Math.pow(v/100,0.7);
        const r=Math.round(238+(8-238)*t);
        const g=Math.round(247+(20-247)*t);
        const b=Math.round(255+(95-255)*t);
        return`rgb(${r},${g},${b})`;
      };
  let html='<thead><tr><th></th>'+days.map(d=>`<th>${d}</th>`).join('')+'</tr></thead><tbody>';
  hours.forEach((h,ri)=>{
    html+=`<tr><td class="row-label">${h}</td>`;
    days.forEach((_,ci)=>{const v=data[ri][ci];const valCls=mode==='connection'?'blue':'';html+=`<td style="background:${cfn(v)}" onmousemove="showHmTip(event,'${days[ci]}','${h}',${v},'${valCls}')" onmouseleave="hideHmTip()"></td>`;});
    html+='</tr>';
  });
  html+='</tbody>';
  document.getElementById(tableId).innerHTML=html;
  const steps=[8,22,40,58,75,92];
  document.getElementById(legendId).innerHTML=steps.map(v=>`<div class="hm-legend-step" style="background:${cfn(v)}"></div>`).join('');

  // ── Insights ──
  const insightId=mode==='outcome'?'hmInsightsOutcome':'hmInsightsConn';
  const metric=mode==='outcome'?'goal achievement':'connection rate';
  const accentBg=mode==='outcome'?a.color+'18':'#dbeafe';
  const accentTxt=mode==='outcome'?a.color:'#1e40af';

  // find peak cell
  let peakVal=0,peakR=0,peakC=0;
  data.forEach((row,ri)=>row.forEach((v,ci)=>{if(v>peakVal){peakVal=v;peakR=ri;peakC=ci;}}));
  // find best day (avg across hours)
  const dayAvg=days.map((_,ci)=>Math.round(data.reduce((s,row)=>s+row[ci],0)/data.length));
  const bestDayIdx=dayAvg.indexOf(Math.max(...dayAvg));
  const worstDayIdx=dayAvg.indexOf(Math.min(...dayAvg));
  // find best hour (avg across days)
  const hourAvg=hours.map((_,ri)=>Math.round(data[ri].reduce((s,v)=>s+v,0)/days.length));
  const bestHourIdx=hourAvg.indexOf(Math.max(...hourAvg));
  // weekend vs weekday
  const weekdayAvg=Math.round([0,1,2,3,4].reduce((s,ci)=>s+dayAvg[ci],0)/5);
  const weekendAvg=Math.round([5,6].reduce((s,ci)=>s+dayAvg[ci],0)/2);

  // second best hour
  const sortedHourAvg=[...hourAvg].sort((a,b)=>b-a);
  const secondBestHourIdx=hourAvg.indexOf(sortedHourAvg[1]);
  // worst hour
  const worstHourIdx=hourAvg.indexOf(Math.min(...hourAvg));
  // drop-off: difference between peak and worst hour
  const dropOff=hourAvg[bestHourIdx]-hourAvg[worstHourIdx];

  const allInsights=[
    {icon:'🏆', bg:accentBg,   always:true,  txt:`<strong>${hours[peakR]} on ${days[peakC]}</strong> is your peak slot with <strong>${peakVal}%</strong> ${metric}.`},
    {icon:'📅', bg:accentBg,   always:false, txt:`<strong>${days[bestDayIdx]}</strong> is your strongest day with an avg ${metric} of <strong>${dayAvg[bestDayIdx]}%</strong>. Prioritise outreach here.`},
    {icon:'⏰', bg:accentBg,   always:true,  txt:`<strong>${hours[bestHourIdx]}</strong> and <strong>${hours[secondBestHourIdx]}</strong> are your two best calling hours — avg <strong>${hourAvg[bestHourIdx]}%</strong> and <strong>${hourAvg[secondBestHourIdx]}%</strong> respectively.`},
    {icon:'📉', bg:'#fef3c7', always:false, txt:`<strong>${days[worstDayIdx]}</strong> consistently underperforms (avg <strong>${dayAvg[worstDayIdx]}%</strong>). Avoid heavy scheduling on this day.`},
    {icon:'📊', bg:'#f3f4f6', always:false, txt:`Weekday ${metric} averages <strong>${weekdayAvg}%</strong> vs <strong>${weekendAvg}%</strong> on weekends — a <strong>${Math.abs(weekdayAvg-weekendAvg)}%</strong> ${weekdayAvg>weekendAvg?'weekday advantage':'weekend advantage'}.`},
  ];
  const insights=activeDayCount<7?allInsights.filter(i=>i.always):allInsights;
  const el=document.getElementById(insightId);
  el.style.justifyContent=insights.length<5?'flex-start':'space-between';
  el.innerHTML=insights.map(i=>`
    <div class="hm-insight-row">
      <div class="hm-insight-icon">${i.icon}</div>
      <div class="hm-insight-text">${i.txt}</div>
    </div>`).join('');
}
function hexToRgb(hex){return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`}

// ─── Heatmap tooltip ───
function showHmTip(e, day, hour, val, valCls){
  const tip=document.getElementById('hmTooltip');
  tip.querySelector('.hmt-day').textContent=`${day} · ${hour}`;
  const valEl=tip.querySelector('.hmt-val');
  valEl.textContent=`${val}% conversion rate`;
  valEl.className='hmt-val'+(valCls?' '+valCls:'');
  tip.style.opacity='1';
  const x=e.clientX, y=e.clientY;
  const tw=tip.offsetWidth||140, th=tip.offsetHeight||52;
  tip.style.left=(x+14+tw>window.innerWidth ? x-tw-8 : x+14)+'px';
  tip.style.top =(y-th-8<0 ? y+14 : y-th-8)+'px';
}
function hideHmTip(){document.getElementById('hmTooltip').style.opacity='0';}

// ─── KPI Tooltip positioning ───
document.addEventListener('mouseover',e=>{
  if(e.target.closest('.kpi-info-icon')){
    const icon=e.target.closest('.kpi-info-icon');
    const tooltip=icon.querySelector('.kpi-tooltip');
    if(tooltip){
      const rect=icon.getBoundingClientRect();
      const tipW=tooltip.offsetWidth||150;
      const tipH=tooltip.offsetHeight||40;
      let left=rect.left+rect.width/2-tipW/2;
      let top=rect.top+rect.height+8;
      // clamp horizontally
      if(left<8)left=8;
      if(left+tipW>window.innerWidth-8)left=window.innerWidth-tipW-8;
      tooltip.style.left=left+'px';
      tooltip.style.top=top+'px';
    }
  }
});

renderAll();
</script>
